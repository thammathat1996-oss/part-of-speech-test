<head>

    <!-- ใส่สไตล์ (CSS) สไตล์ 8-Bit และแอนิเมชันที่นี่ -->
    <style>
        body { font-family: 'Press Start 2P', 'Chakra Petch', monospace; }
        .retro-text { text-shadow: 2px 2px 0px #000; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        .pixel-bg { background-image: radial-gradient(#ffffff22 1px, transparent 0); background-size: 20px 20px; }
        
        /* 🔥 WOW 3D ARCADE TITLE 🔥 */
        .arcade-title-container {
          display: inline-block;
          border: 6px double #00e676;
          padding: 1rem 2rem;
          background: rgba(0,0,0,0.8);
          animation: border-dance 0.5s infinite step-end;
          box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        @keyframes border-dance {
          0%, 100% { border-color: #ff0055; box-shadow: inset 0 0 10px #ff0055; }
          33% { border-color: #ffcc00; box-shadow: inset 0 0 10px #ffcc00; }
          66% { border-color: #00e676; box-shadow: inset 0 0 10px #00e676; }
        }
        .arcade-title-text {
          color: #fff;
          font-weight: 900;
          letter-spacing: 2px;
          text-shadow: 
            2px 2px 0px #ff0055,
            4px 4px 0px #ff0055,
            6px 6px 0px #00e676,
            8px 8px 0px #00e676,
            10px 10px 0px #ffcc00;
          animation: pulse-title 2s infinite ease-in-out;
        }
        @keyframes pulse-title {
          0%, 100% { transform: scale(1); }
          50% { transform: scale(1.05); }

        /* Gimmick Animations */
        @keyframes shake {
          0%, 100% { transform: translateX(0); }
          25% { transform: translateX(-10px) rotate(-1deg); }
          50% { transform: translateX(10px) rotate(1deg); }
          75% { transform: translateX(-10px) rotate(-1deg); }
        }
        .animate-shake { animation: shake 0.4s ease-in-out; }

        @keyframes pop {
          0% { transform: scale(0.9); opacity: 0; }
          50% { transform: scale(1.05); opacity: 1; }
          100% { transform: scale(1); opacity: 1; }

        #ghost { position: relative; transform: scale(0.45); transform-origin: center; display: inline-block; }
        #red {
          animation: upNDown infinite 0.5s; position: relative; width: 140px; height: 140px; display: grid;
          grid-template-columns: repeat(14, 1fr); grid-template-rows: repeat(14, 1fr);
          grid-template-areas:
            "a1  a2  a3  a4  a5  top0  top0  top0  top0  a10 a11 a12 a13 a14"
            "b1  b2  b3  top1 top1 top1 top1 top1 top1 top1 top1 b12 b13 b14"
            "c1 c2 top2 top2 top2 top2 top2 top2 top2 top2 top2 top2 c13 c14"
            "d1 top3 top3 top3 top3 top3 top3 top3 top3 top3 top3 top3 top3 d14"
            "e1 top3 top3 top3 top3 top3 top3 top3 top3 top3 top3 top3 top3 e14"
            "f1 top3 top3 top3 top3 top3 top3 top3 top3 top3 top3 top3 top3 f14"
            "top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4"
            "top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4"
            "top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4"
            "top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4"
            "top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4"
            "top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4 top4"
            "st0 st0 an4 st1 an7 st2 an10 an10 st3 an13 st4 an16 st5 st5"
            "an1 an2 an3 an5 an6 an8 an9 an9 an11 an12 an14 an15 an17 an18";
        }
        @keyframes upNDown { 0%, 49% { transform: translateY(0px); } 50%, 100% { transform: translateY(-10px); } }
        #top0, #top1, #top2, #top3, #top4, #st0, #st1, #st2, #st3, #st4, #st5 { background-color: #ff0055; }
        #top0 { grid-area: top0; } #top1 { grid-area: top1; } #top2 { grid-area: top2; } #top3 { grid-area: top3; } #top4 { grid-area: top4; }
        #st0 { grid-area: st0; } #st1 { grid-area: st1; } #st2 { grid-area: st2; } #st3 { grid-area: st3; } #st4 { grid-area: st4; } #st5 { grid-area: st5; }
        #an1 { grid-area: an1; animation: flicker0 infinite 0.5s; } #an18 { grid-area: an18; animation: flicker0 infinite 0.5s; }
        #an2 { grid-area: an2; animation: flicker1 infinite 0.5s; } #an17 { grid-area: an17; animation: flicker1 infinite 0.5s; }
        #an3 { grid-area: an3; animation: flicker1 infinite 0.5s; } #an16 { grid-area: an16; animation: flicker1 infinite 0.5s; }
        #an4 { grid-area: an4; animation: flicker1 infinite 0.5s; } #an15 { grid-area: an15; animation: flicker1 infinite 0.5s; }
        #an6 { grid-area: an6; animation: flicker0 infinite 0.5s; } #an12 { grid-area: an12; animation: flicker0 infinite 0.5s; }
        #an7 { grid-area: an7; animation: flicker0 infinite 0.5s; } #an13 { grid-area: an13; animation: flicker0 infinite 0.5s; }
        #an9 { grid-area: an9; animation: flicker1 infinite 0.5s; } #an10 { grid-area: an10; animation: flicker1 infinite 0.5s; }
        #an8 { grid-area: an8; animation: flicker0 infinite 0.5s; } #an11 { grid-area: an11; animation: flicker0 infinite 0.5s; }
        @keyframes flicker0 { 0%, 49% { background-color: #ff0055; } 50%, 100% { background-color: transparent; } }
        @keyframes flicker1 { 0%, 49% { background-color: transparent; } 50%, 100% { background-color: #ff0055; } }
        #eye { width: 40px; height: 50px; position: absolute; top: 30px; left: 10px; }
        #eye::before { content: ""; background-color: white; width: 20px; height: 50px; transform: translateX(10px); display: block; position: absolute; }
        #eye::after { content: ""; background-color: white; width: 40px; height: 30px; transform: translateY(10px); display: block; position: absolute; }
        #eye1 { width: 40px; height: 50px; position: absolute; top: 30px; right: 30px; }
        #eye1::before { content: ""; background-color: white; width: 20px; height: 50px; transform: translateX(10px); display: block; position: absolute; }
        #eye1::after { content: ""; background-color: white; width: 40px; height: 30px; transform: translateY(10px); display: block; position: absolute; }
        #pupil { width: 20px; height: 20px; background-color: blue; position: absolute; top: 50px; left: 10px; z-index: 1; animation: eyesMovement infinite 3s; }
        #pupil1 { width: 20px; height: 20px; background-color: blue; position: absolute; top: 50px; right: 50px; z-index: 1; animation: eyesMovement infinite 3s; }
        @keyframes eyesMovement { 0%, 49% { transform: translateX(0px); } 50%, 99% { transform: translateX(10px); } 100% { transform: translateX(0px); } }
        #shadow { background-color: black; width: 140px; height: 140px; position: absolute; border-radius: 50%; transform: rotateX(80deg); filter: blur(20px); top: 80%; animation: shadowMovement infinite 0.5s; }
        @keyframes shadowMovement { 0%, 49% { opacity: 0.5; } 50%, 100% { opacity: 0.2; } }
    </style>
</head>
<body class="bg-[#2b2b45] text-white selection:bg-pink-500 m-0 p-0">
    <div id="root"></div>

    <!-- สคริปต์หลักสำหรับรัน React -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';
        import { Trophy, ArrowRight, RotateCcw, Play, CheckCircle, XCircle, Download, Trash2, Search, Shield, Users, Database, ChevronLeft, ChevronRight, Send, Flame } from 'https://esm.sh/lucide-react@0.344.0';
        
        // อิมพอร์ต Firebase สำหรับเซฟข้อมูลถาวร (ใช้เวอร์ชัน gstatic ป้องกันปัญหา Component auth error)
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // ----------------------------------------------------------------------
        // 1. FIREBASE SETUP
        // ----------------------------------------------------------------------
        const myFirebaseConfig = {
            // หากระบบไม่ยอมบันทึกบน GitHub Pages กรุณานำ config จาก Firebase ของคุณมาใส่ตรงนี้
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        const firebaseConfig = typeof __firebase_config !== 'undefined' && __firebase_config ? JSON.parse(__firebase_config) : myFirebaseConfig;
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'pos-exam-github';

        // ----------------------------------------------------------------------
        // 2. EXAM DATA (30 Mixed Questions)
        // ----------------------------------------------------------------------
        const QUESTIONS = [
            { q: "คำนาม (Noun) หมายถึงอะไร ทำหน้าที่อะไร?", opts: ["คน สัตว์ สิ่งของ สถานที่", "การกระทำหรือสภาพ", "คำเชื่อมประโยค", "คำแสดงอารมณ์"], a: "คน สัตว์ สิ่งของ สถานที่" },
            { q: "คำกริยา (Verb) คือคำประเภทใด?", opts: ["คำแทนชื่อคน", "คำแสดงการกระทำหรือสภาพ", "คำขยายสิ่งของ", "คำอุทานตกใจ"], a: "คำแสดงการกระทำหรือสภาพ" },
            { q: "Adjective ทำหน้าที่อะไรในประโยค?", opts: ["แทนชื่อคน สัตว์ สิ่งของ", "บอกตำแหน่งที่อยู่", "ขยายคำนามหรือสรรพนาม", "เชื่อมประโยคเข้าด้วยกัน"], a: "ขยายคำนามหรือสรรพนาม" },
            { q: "ข้อใดคือหน้าที่ของ Pronoun (คำสรรพนาม)?", opts: ["ขยายการกระทำ", "เชื่อมคำสองคำเข้าด้วยกัน", "ใช้แทนคำนามเพื่อลดการซ้ำคำ", "บอกเวลาและสถานที่"], a: "ใช้แทนคำนามเพื่อลดการซ้ำคำ" },
            { q: "ข้อใดต่อไปนี้เป็น Noun ทั้งหมด?", opts: ["dog, tree, school", "run, jump, swim", "beautiful, red, tall", "in, on, under"], a: "dog, tree, school" },
            { q: "ข้อใดต่อไปนี้เป็น Verb ทั้งหมด?", opts: ["eat, sleep, play", "cat, dog, rat", "he, she, it", "and, but, or"], a: "eat, sleep, play" },
            { q: "คำว่า 'beautiful' เป็นคำประเภทใด?", opts: ["Noun", "Verb", "Adjective", "Adverb"], a: "Adjective" },
            { q: "คำว่า 'happily' เป็นคำประเภทใด?", opts: ["Noun", "Verb", "Adjective", "Adverb"], a: "Adverb" },
            { q: "คำใดคือ Preposition (คำบุพบท)?", opts: ["under", "because", "ouch!", "quickly"], a: "under" },
            { q: "คำใดคือ Conjunction (คำสันธาน)?", opts: ["and", "house", "jump", "they"], a: "and" },
            { q: "She is a _____ girl. (ต้องการคำประเภทใดมาเติม?)", opts: ["Noun", "Verb", "Adjective", "Preposition"], a: "Adjective" },
            { q: "He drives very _____. (ต้องการคำประเภทใดมาเติม?)", opts: ["Noun", "Pronoun", "Adverb", "Conjunction"], a: "Adverb" },
            { q: "The *cat* is sleeping on the sofa.", opts: ["Noun", "Verb", "Adjective", "Adverb"], a: "Noun" },
            { q: "She *runs* quickly.", opts: ["Noun", "Verb", "Adjective", "Adverb"], a: "Verb" },
            { q: "The turtle walks *slowly*.", opts: ["Verb", "Adjective", "Adverb", "Preposition"], a: "Adverb" },
            { q: "*They* went to the cinema together.", opts: ["Noun", "Pronoun", "Verb", "Conjunction"], a: "Pronoun" },
            { q: "The book is *on* the table.", opts: ["Adjective", "Adverb", "Preposition", "Conjunction"], a: "Preposition" },
            { q: "I like coffee, *but* my sister likes tea.", opts: ["Pronoun", "Preposition", "Conjunction", "Interjection"], a: "Conjunction" },
            { q: "*Wow!* That is a beautiful car.", opts: ["Adverb", "Preposition", "Conjunction", "Interjection"], a: "Interjection" },
            { q: "We saw a *huge* elephant at the zoo.", opts: ["Noun", "Adjective", "Adverb", "Preposition"], a: "Adjective" },
            { q: "My *mother* bakes delicious cookies.", opts: ["Noun", "Verb", "Adjective", "Pronoun"], a: "Noun" },
            { q: "Please *listen* carefully to the instructions.", opts: ["Noun", "Verb", "Adverb", "Interjection"], a: "Verb" },
            { q: "This pen is *mine*.", opts: ["Noun", "Pronoun", "Adjective", "Adverb"], a: "Pronoun" },
            { q: "He walked *through* the dark forest.", opts: ["Adverb", "Preposition", "Conjunction", "Interjection"], a: "Preposition" },
            { q: "You can have tea *or* coffee.", opts: ["Preposition", "Conjunction", "Adverb", "Pronoun"], a: "Conjunction" },
            { q: "*Ouch!* I bit my tongue.", opts: ["Adjective", "Preposition", "Conjunction", "Interjection"], a: "Interjection" },
            { q: "Honesty is the best *policy*.", opts: ["Noun", "Verb", "Adjective", "Adverb"], a: "Noun" },
            { q: "The children *are playing* outside.", opts: ["Noun", "Verb", "Adverb", "Preposition"], a: "Verb" },
            { q: "He *always* forgets his keys.", opts: ["Verb", "Adjective", "Adverb", "Preposition"], a: "Adverb" },
            { q: "The plane flew *above* the clouds.", opts: ["Adverb", "Preposition", "Conjunction", "Interjection"], a: "Preposition" }
        ];

        // ----------------------------------------------------------------------
        // 3. 8-BIT AUDIO SYNTHESIZER
        // ----------------------------------------------------------------------
        let audioCtx = null;
        const initAudio = () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        };

        const playSFX = (type) => {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            
            if (type === 'start') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gainNode.gain.setValueAtTime(0.05, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.setValueAtTime(1000, now + 0.05);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            }
        };

        // ----------------------------------------------------------------------
        // 4. ANIMATED GHOST COMPONENT
        // ----------------------------------------------------------------------
        const GhostIcon = () => (
            <div className="flex justify-center items-center h-[70px] mb-2 mt-1">
                <div id="ghost">
                <div id="shadow"></div>
                <div id="red">
                    <div id="top0"></div><div id="top1"></div><div id="top2"></div><div id="top3"></div><div id="top4"></div>
                    <div id="st0"></div><div id="st1"></div><div id="st2"></div><div id="st3"></div><div id="st4"></div><div id="st5"></div>
                    <div id="an1"></div><div id="an2"></div><div id="an3"></div><div id="an4"></div>
                    <div id="an6"></div><div id="an7"></div><div id="an8"></div><div id="an9"></div>
                    <div id="an10"></div><div id="an11"></div><div id="an12"></div><div id="an13"></div>
                    <div id="an15"></div><div id="an16"></div><div id="an17"></div><div id="an18"></div>
                    <div id="eye"></div><div id="eye1"></div>
                    <div id="pupil"></div><div id="pupil1"></div>
                </div>
                </div>
            </div>
        );

        // ----------------------------------------------------------------------
        // 5. MAIN APP COMPONENT
        // ----------------------------------------------------------------------
        function App() {
            const [user, setUser] = useState(null);
            const [appMode, setAppMode] = useState('student');
            const [appState, setAppState] = useState('intro'); 
            
            // Game State
            const [student, setStudent] = useState({ name: '', studentNo: '', room: '4/7' }); 
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [userAnswers, setUserAnswers] = useState(new Array(QUESTIONS.length).fill(null));
            const [score, setScore] = useState(0);
            
            // UI States
            const [formError, setFormError] = useState('');
            const [showPinModal, setShowPinModal] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const [pinError, setPinError] = useState(false);
            const [deleteId, setDeleteId] = useState(null);
            const [showConfirmSubmit, setShowConfirmSubmit] = useState(false);
            
            // Firebase Data State
            const [leaderboard, setLeaderboard] = useState([]);
            const [adminSearch, setAdminSearch] = useState('');
            const [isSaving, setIsSaving] = useState(false);

            const scrollRef = useRef(null);

            // Auth Hook
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (err) { console.warn("Firebase Auth Warning:", err); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // Database Fetch Hook
            useEffect(() => {
                if (!user) return;
                try {
                    const scoresRef = collection(db, 'artifacts', appId, 'public', 'data', 'pos_exam_scores');
                    const unsub = onSnapshot(scoresRef, (snap) => {
                        const data = [];
                        snap.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
                        data.sort((a, b) => b.score - a.score || new Date(b.timestamp) - new Date(a.timestamp));
                        setLeaderboard(data);
                    });
                    return () => unsub();
                } catch(err) {
                    console.warn("Firestore not configured:", err);
                }
            }, [user]);

            // Scroll Nav smoothly
            useEffect(() => {
                if (appState === 'quiz' && scrollRef.current) {
                const activeBtn = scrollRef.current.children[currentQIndex];
                if (activeBtn) {
                    activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
                }
            }, [currentQIndex, appState]);

            const handleStartForm = () => {
                initAudio(); playSFX('start');
                setAppState('form');
            };

            const handleStartQuiz = (e) => {
                e.preventDefault();
                if (!student.name || !student.studentNo || !student.room) {
                    setFormError("⚠️ กรุณากรอกข้อมูลให้ครบถ้วน!");
                    return;
                }
                setFormError('');
                initAudio(); playSFX('start');
                setAppState('quiz');
                setCurrentQIndex(0);
                setUserAnswers(new Array(QUESTIONS.length).fill(null));
                setScore(0);
            };

            const handleSelectAnswer = (selectedOpt) => {
                initAudio(); playSFX('start');
                const newAnswers = [...userAnswers];
                newAnswers[currentQIndex] = selectedOpt;
                setUserAnswers(newAnswers);
            };

            const goNext = () => {
                if (currentQIndex < QUESTIONS.length - 1) {
                    initAudio(); playSFX('start');
                    setCurrentQIndex(prev => prev + 1);
                }
            };

            const goPrev = () => {
                if (currentQIndex > 0) {
                    initAudio(); playSFX('start');
                    setCurrentQIndex(prev => prev - 1);
                }
            };

            const jumpToQuestion = (index) => {
                initAudio(); playSFX('start');
                setCurrentQIndex(index);
            };

            const attemptSubmit = () => {
                initAudio(); playSFX('start');
                const unansweredCount = userAnswers.filter(ans => ans === null).length;
                if (unansweredCount > 0) {
                    setShowConfirmSubmit(true);
                } else {
                    processSubmit();
                }
            };

            // ระบบส่งคะแนนขึ้น Firebase
            const processSubmit = async () => {
                setShowConfirmSubmit(false);
                initAudio(); playSFX('correct');
                
                let finalScore = 0;
                userAnswers.forEach((ans, i) => {
                    if (ans === QUESTIONS[i].a) finalScore++;
                });
                
                setScore(finalScore);
                setAppState('result');
                setIsSaving(true);
                
                try {
                    const payload = {
                        ...student,
                        score: finalScore,
                        total: QUESTIONS.length,
                        timestamp: new Date().toISOString(),
                        userId: user ? user.uid : 'anonymous'
                    };
                    // บันทึกขึ้น Firestore
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'pos_exam_scores'), payload);

                        {/* ===================== ADMIN MODE ======================== */}
                        {appMode === 'admin' && (
                            <div className="w-full">
                                <div className={`bg-[#e5e7eb] p-4 md:p-8 ${pixelBorder} space-y-4 md:space-y-6 text-black`}>
                                    <div className="flex justify-between items-center border-b-4 border-black pb-3 md:pb-4">
                                        <div className="flex items-center">
                                            <Shield className="mr-2 md:mr-3 text-[#ff0055]" size={24} />
                                            <h2 className="text-lg md:text-2xl font-black retro-text whitespace-nowrap">ADMIN CONTROL</h2>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-2 md:gap-4 text-center">
                                        <div className={`bg-white p-2 md:p-4 border-2 md:border-4 border-black shadow-[2px_2px_0_0_rgba(0,0,0,1)] md:shadow-[4px_4px_0_0_rgba(0,0,0,1)]`}>
                                            <div className="text-[10px] md:text-xs font-bold text-gray-500 mb-1">TOTAL</div>
                                            <div className="text-lg md:text-3xl font-black text-black">{leaderboard.length}</div>
                                        </div>
                                        <div className={`bg-white p-2 md:p-4 border-2 md:border-4 border-black shadow-[2px_2px_0_0_rgba(0,0,0,1)] md:shadow-[4px_4px_0_0_rgba(0,0,0,1)]`}>
                                            <div className="text-[10px] md:text-xs font-bold text-gray-500 mb-1">AVG SCORE</div>
                                            <div className="text-lg md:text-3xl font-black text-[#4ec0ca]">{leaderboard.length > 0 ? (leaderboard.reduce((a, b) => a + b.score, 0) / leaderboard.length).toFixed(1) : 0}</div>
                                        </div>
                                        <div className={`bg-white p-2 md:p-4 border-2 md:border-4 border-black shadow-[2px_2px_0_0_rgba(0,0,0,1)] md:shadow-[4px_4px_0_0_rgba(0,0,0,1)]`}>
                                            <div className="text-[10px] md:text-xs font-bold text-gray-500 mb-1">HIGH SCORE</div>
                                            <div className="text-lg md:text-3xl font-black text-[#00e676]">{leaderboard[0]?.score || 0}</div>
                                        </div>
                                        <div className={`bg-[#00e676] p-2 md:p-4 border-2 md:border-4 border-black shadow-[2px_2px_0_0_rgba(0,0,0,1)] md:shadow-[4px_4px_0_0_rgba(0,0,0,1)] cursor-pointer hover:bg-green-400 active:translate-y-1 active:shadow-none transition-all flex flex-col justify-center items-center`} onClick={exportCSV}>
                                            <Download size={18} className="md:w-6 md:h-6 mb-1 md:mb-2" />
                                            <div className="text-[9px] md:text-xs font-black">EXPORT CSV</div>
                                        </div>
                                    </div>
                                    <div className="bg-white p-2 md:p-4 border-2 md:border-4 border-black shadow-[2px_2px_0_0_rgba(0,0,0,1)] md:shadow-[4px_4px_0_0_rgba(0,0,0,1)]">
                                        <div className="relative">
                                            <Search className="absolute left-2 md:left-3 top-2 md:top-3 text-gray-400" size={18} />
                                            <input style={{fontFamily: "'Chakra Petch'"}} type="text" placeholder="ค้นหา ชื่อ, เลขที่, ห้อง..." value={adminSearch} onChange={e => setAdminSearch(e.target.value)} className="w-full bg-gray-100 border-2 border-black text-black p-1.5 md:p-2 pl-8 md:pl-10 focus:outline-none focus:bg-white font-bold text-sm md:text-base" />
                                        </div>
                                    </div>
                                    <div className="bg-white border-2 md:border-4 border-black shadow-[2px_2px_0_0_rgba(0,0,0,1)] md:shadow-[4px_4px_0_0_rgba(0,0,0,1)] overflow-hidden">
                                        <div className="overflow-x-auto h-[350px] md:h-[400px]">
                                            <table className="w-full text-left font-bold text-[10px] sm:text-xs md:text-sm whitespace-nowrap min-w-[450px] md:min-w-[600px]">
                                                <thead className="bg-black text-white sticky top-0 z-10">
                                                    <tr>
                                                        <th className="p-2 md:p-3">วันที่/เวลา</th>
                                                        <th className="p-2 md:p-3">ชื่อ-นามสกุล</th>
                                                        <th className="p-2 md:p-3 text-center">เลขที่</th>
                                                        <th className="p-2 md:p-3 text-center">ห้อง</th>
                                                        <th className="p-2 md:p-3 text-center">คะแนน</th>
                                                        <th className="p-2 md:p-3 text-center">จัดการ</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y-2 divide-gray-200">
                                                    {filteredAdminList.map((record) => (
                                                        <tr key={record.id} className="hover:bg-yellow-50 transition-colors">
                                                            <td className="p-2 md:p-3 text-gray-500">{new Date(record.timestamp).toLocaleString('th-TH', {dateStyle: 'short', timeStyle: 'short'})}</td>
                                                            <td className="p-2 md:p-3 max-w-[100px] md:max-w-[200px] truncate" style={{fontFamily: "'Chakra Petch'"}} title={record.name}>{record.name}</td>
                                                            <td className="p-2 md:p-3 text-center">{record.studentNo}</td>
                                                            <td className="p-2 md:p-3 text-center">{record.room}</td>
                                                            <td className="p-2 md:p-3 text-center text-sm md:text-lg text-[#00e676] retro-text">{record.score}</td>
                                                            <td className="p-2 md:p-3 text-center">
                                                                <button onClick={() => triggerDelete(record.id)} className="text-white bg-red-500 hover:bg-red-600 border-2 border-black p-1 shadow-[2px_2px_0_0_rgba(0,0,0,1)] active:shadow-none active:translate-y-1 transition-all rounded-sm" title="ลบข้อมูล">
                                                                <Trash2 size={14} className="md:w-4 md:h-4" />
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                    {filteredAdminList.length === 0 && (
                                                        <tr><td colSpan="6" className="p-4 md:p-6 text-center text-gray-500 bg-gray-50">ไม่พบข้อมูล</td></tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* CREDITS FOOTER */}
                    {appState !== 'quiz' && (
                        <footer className="w-full bg-black/80 text-center py-3 md:py-4 px-2 mt-auto text-[10px] md:text-sm text-gray-400 font-bold retro-text z-20 border-t-2 border-white/10 relative" style={{fontFamily: "'Chakra Petch'"}}>
                            <div className="flex flex-col sm:flex-row justify-center items-center gap-1 sm:gap-2">
                                <span>จัดทำโดย ครูธรรมธัช ธรรมราช</span>
                                <span className="hidden sm:inline text-gray-600">|</span>
                                <span>กลุ่มสาระการเรียนรู้ภาษาต่างประเทศ</span>
                            </div>
                            <div className="mt-1 text-[#ffcc00] opacity-90">
                                โรงเรียนห้องสอนศึกษา ในพระอุปถัมภ์ฯ
                            </div>
                        </footer>
                    )}
                </div>
            );
        }

        // Render App
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
